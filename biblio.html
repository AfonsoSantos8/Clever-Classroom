<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/paginas.css">
    <title>Clever Classroom</title>
</head>

<body>

    <header>
        <div class="image-title">
            <img src="images/title.png" alt="title">
        </div>
        <a class="home-button" href="home.html">Home</a>
    </header>

    <main>
        <section class="room-section">
            <h2>Biblioteca</h2>
            <p>
                Querias que a biblioteca fosse diferente?
            </p>

            <div class="gallery">
                <div class="image-card">
                    <img src="images/biblio1.png" alt="biblio 1">
                    <div class="caption">E se a biblioteca tivesse um dinossauro?</div>
                </div>

                <div class="image-card">
                    <img src="images/biblio2.png" alt="biblio 2">
                    <div class="caption">E se a biblioteca tivesse um aquário?</div>
                </div>

                <div class="image-card">
                    <img src="images/biblio3.jpeg" alt="biblio 3">
                    <div class="caption">E se a biblioteca tivesse z?</div>
                </div>

                <div class="image-card highlight">
                    <img src="images/biblio4.jpeg" alt="biblio 4">
                    <div class="caption">E se a biblioteca tivesse... mais espaço?</div>
                </div>
            </div>

        </section>
    </main>

</body>

</html>
